<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏆 LIVE DASHBOARD LCC PMR KABUPATEN JEMBRANA 2026</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* ==========================================
       1. MODERN DESIGN SYSTEM & RESET
       ========================================== */
    :root {
      --bg-base: #030712; /* Slate 950 ultra-dark */
      --panel-bg: rgba(15, 23, 42, 0.45); /* Glass base */
      --panel-border: rgba(255, 255, 255, 0.06);
      
      --neon-red: #ff2a5f;
      --neon-red-glow: rgba(255, 42, 95, 0.35);
      --neon-blue: #00f0ff;
      --neon-blue-glow: rgba(0, 240, 255, 0.3);
      --neon-gold: #f59e0b;
      --neon-gold-glow: rgba(245, 158, 11, 0.35);
      
      --gold: #fbcfe8; /* Soft golden tint */
      --silver: #e2e8f0;
      --bronze: #ffedd5;
      
      --font-main: 'Plus Jakarta Sans', sans-serif;
      --font-space: 'Space Grotesk', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-base);
      background-image: 
        radial-gradient(circle at 15% 15%, rgba(255, 42, 95, 0.12) 0%, transparent 45%),
        radial-gradient(circle at 85% 85%, rgba(0, 240, 255, 0.1) 0%, transparent 45%);
      background-attachment: fixed;
      color: #f3f4f6;
      font-family: var(--font-main);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      line-height: 1.5;
    }

    /* ==========================================
       2. PREMIUM ULTRA-MODERN HEADER
       ========================================== */
    header {
      background: rgba(3, 7, 18, 0.6);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--panel-border);
      padding: 0.8rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    .header-logo-side {
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }

    /* Perbaikan Khusus Logo PMI agar Tidak Kebesaran & Tidak Potong */
    .logo-img-wrapper {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 6px 14px;
      transition: all 0.3s ease;
    }

    .logo-img-wrapper:hover {
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(255, 42, 95, 0.3);
      transform: translateY(-2px);
    }

    .logo-img-wrapper img {
      height: 100%;
      max-width: 130px;
      object-fit: contain;
      filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.15));
    }

    .header-center-info {
      text-align: center;
    }

    .header-center-info h1 {
      font-family: var(--font-space);
      font-weight: 700;
      font-size: 1.6rem;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ffffff 40%, #a5f3fc 70%, var(--neon-red) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.15rem;
      text-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
    }

    .live-indicator-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      font-size: 0.85rem;
      color: #9ca3af;
    }

    .badge-live-pulse {
      background: var(--neon-red);
      color: white;
      font-size: 0.7rem;
      font-weight: 800;
      padding: 0.15rem 0.6rem;
      border-radius: 50px;
      letter-spacing: 1px;
      animation: pulseGlow 1.5s infinite;
      box-shadow: 0 0 10px var(--neon-red-glow);
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }

    /* ==========================================
       3. NAVIGATION & VIEW CONTROLS
       ========================================== */
    .controls-wrapper {
      padding: 1.5rem 2.5rem 0.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1.2rem;
    }

    .nav-tabs {
      display: flex;
      background: rgba(255, 255, 255, 0.02);
      padding: 0.25rem;
      border-radius: 14px;
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(8px);
    }

    .tab-trigger {
      background: transparent;
      border: none;
      color: #9ca3af;
      padding: 0.7rem 1.4rem;
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      font-family: var(--font-space);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .tab-trigger.active {
      background: var(--neon-red);
      color: white;
      box-shadow: 0 4px 15px var(--neon-red-glow);
    }

    .tab-trigger:hover:not(.active) {
      color: white;
      background: rgba(255, 255, 255, 0.05);
    }

    .actions-group {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .btn-control {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--panel-border);
      color: white;
      padding: 0.65rem 1.2rem;
      border-radius: 12px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.25s ease;
      backdrop-filter: blur(8px);
    }

    .btn-control:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }

    .btn-control.btn-primary {
      background: linear-gradient(135deg, var(--neon-blue), #0b8fa0);
      border: none;
      color: #030712;
      box-shadow: 0 4px 15px var(--neon-blue-glow);
    }

    .btn-control.btn-primary:hover {
      box-shadow: 0 6px 20px rgba(0, 240, 255, 0.55);
      transform: translateY(-2px);
    }

    .sync-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.82rem;
      color: #9ca3af;
      background: rgba(255, 255, 255, 0.02);
      padding: 0.65rem 1rem;
      border-radius: 12px;
      border: 1px solid var(--panel-border);
    }

    .status-ping {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 8px #10b981;
    }

    .status-ping.connecting {
      background: var(--neon-gold);
      box-shadow: 0 0 8px var(--neon-gold);
      animation: pulseGlow 1s infinite;
    }

    .status-ping.offline {
      background: var(--neon-red);
      box-shadow: 0 0 8px var(--neon-red);
    }

    /* ==========================================
       4. RESPONSIVE DASHBOARD LAYOUT
       ========================================== */
    .dashboard-view-wrapper {
      flex: 1;
      padding: 1rem 2.5rem 2.5rem;
      display: grid;
      gap: 2rem;
      align-items: start;
    }

    /* Mode Fokus 1 Kategori + Maskot Terintegrasi di Dashboard */
    .view-focus {
      grid-template-columns: 1fr 340px;
    }

    /* Mode Tampil Semua Kategori (3 Kolom Sejajar) */
    .view-grid-all {
      grid-template-columns: repeat(3, 1fr);
    }

    .board-container {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      padding: 1.8rem 2rem;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      position: relative;
      overflow: hidden;
    }

    /* Garis Aksentuasi Cahaya di Papan Peringkat */
    .board-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon-red), var(--neon-blue), transparent);
    }

    .board-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 1rem;
    }

    .board-title-group {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .board-icon {
      font-size: 1.4rem;
      color: var(--neon-blue);
      filter: drop-shadow(0 0 6px var(--neon-blue-glow));
    }

    .board-title {
      font-family: var(--font-space);
      font-size: 1.3rem;
      font-weight: 700;
      color: white;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .board-badge {
      font-size: 0.75rem;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ==========================================
       5. CARD KONTESTAN ULTRA-MODERN (LEADERBOARD ITEMS)
       ========================================== */
    .contestant-list {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }

    .contestant-card {
      background: rgba(255, 255, 255, 0.015);
      border: 1px solid rgba(255, 255, 255, 0.03);
      border-radius: 16px;
      padding: 1rem 1.4rem;
      display: flex;
      align-items: center;
      gap: 1.2rem;
      position: relative;
      overflow: hidden;
      transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    /* Soft Glow Effects untuk Peringkat Teratas */
    .contestant-card.top-1 {
      background: linear-gradient(90deg, rgba(245, 158, 11, 0.08) 0%, rgba(255, 255, 255, 0.01) 100%);
      border-color: rgba(245, 158, 11, 0.22);
    }
    .contestant-card.top-2 {
      background: linear-gradient(90deg, rgba(226, 232, 240, 0.06) 0%, rgba(255, 255, 255, 0.01) 100%);
      border-color: rgba(226, 232, 240, 0.18);
    }
    .contestant-card.top-3 {
      background: linear-gradient(90deg, rgba(255, 237, 213, 0.04) 0%, rgba(255, 255, 255, 0.01) 100%);
      border-color: rgba(255, 237, 213, 0.15);
    }

    .contestant-card:hover {
      transform: translateX(6px);
      background: rgba(255, 255, 255, 0.035);
      border-color: rgba(255, 255, 255, 0.12);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
    }

    .medal-icon-wrapper {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-space);
      font-size: 1.25rem;
      font-weight: 700;
      position: relative;
    }

    .top-1 .medal-icon-wrapper {
      background: linear-gradient(135deg, var(--neon-gold), #b45309);
      color: #030712;
      border: none;
      box-shadow: 0 0 15px var(--neon-gold-glow);
    }
    .top-2 .medal-icon-wrapper {
      background: linear-gradient(135deg, #e2e8f0, #475569);
      color: #030712;
      border: none;
      box-shadow: 0 0 12px rgba(226, 232, 240, 0.35);
    }
    .top-3 .medal-icon-wrapper {
      background: linear-gradient(135deg, #f97316, #7c2d12);
      color: white;
      border: none;
      box-shadow: 0 0 10px rgba(249, 115, 22, 0.3);
    }

    .info-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .team-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: white;
      letter-spacing: 0.3px;
    }

    .team-meta {
      font-size: 0.8rem;
      color: #9ca3af;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .badge-status {
      background: rgba(255, 42, 95, 0.12);
      border: 1px solid rgba(255, 42, 95, 0.2);
      color: var(--neon-red);
      padding: 0.1rem 0.5rem;
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 700;
    }

    .score-wrapper {
      text-align: right;
    }

    .score-val {
      font-family: var(--font-space);
      font-size: 2.2rem;
      font-weight: 700;
      color: white;
      line-height: 1;
    }

    .top-1 .score-val {
      color: var(--neon-gold);
      text-shadow: 0 0 8px var(--neon-gold-glow);
    }

    .score-lbl {
      font-size: 0.7rem;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Progress Bar (Visualisasi Kesenjangan Skor) */
    .indicator-bar-bg {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: rgba(255, 255, 255, 0.01);
    }

    .indicator-bar-fill {
      height: 100%;
      width: 0%;
      background: rgba(255, 255, 255, 0.1);
      transition: width 1.5s cubic-bezier(0.1, 0.8, 0.1, 1);
    }

    .top-1 .indicator-bar-fill { background: linear-gradient(90deg, transparent, var(--neon-gold)); }
    .top-2 .indicator-bar-fill { background: linear-gradient(90deg, transparent, #e2e8f0); }
    .top-3 .indicator-bar-fill { background: linear-gradient(90deg, transparent, #f97316); }

    /* ==========================================
       6. INTEGRATED MASKOT PANEL (TAMPILAN MASKOT MODERN)
       ========================================== */
    .mascot-board-wrapper {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .mascot-card-premium {
      background: linear-gradient(145deg, rgba(15, 23, 42, 0.6) 0%, rgba(255, 255, 255, 0.01) 100%);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      padding: 1.8rem;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* Animasi Mengambang Modern untuk Maskot */
    .floating-mascot-img {
      width: 100%;
      max-height: 220px;
      object-fit: contain;
      filter: drop-shadow(0 8px 25px rgba(255, 42, 95, 0.25));
      border-radius: 16px;
      animation: floatMascot 4s ease-in-out infinite;
      margin-bottom: 1.2rem;
      transition: transform 0.3s ease;
    }

    .floating-mascot-img:hover {
      transform: scale(1.05) rotate(1deg);
    }

    .mascot-title-group {
      margin-bottom: 0.6rem;
    }

    .mascot-heading-name {
      font-family: var(--font-space);
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--neon-red);
      letter-spacing: 0.5px;
      text-shadow: 0 0 10px var(--neon-red-glow);
    }

    .mascot-badge-name {
      font-size: 0.72rem;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #d1d5db;
      padding: 0.15rem 0.6rem;
      border-radius: 50px;
      font-weight: 600;
      display: inline-block;
      margin-top: 0.2rem;
    }

    .mascot-text-info {
      font-size: 0.85rem;
      color: #9ca3af;
      line-height: 1.45;
    }

    /* Podium Penjelasan Card */
    .podium-explain-card {
      background: rgba(15, 23, 42, 0.45);
      border: 1px solid var(--panel-border);
      border-radius: 20px;
      padding: 1.2rem 1.5rem;
    }

    .podium-explain-card h4 {
      font-family: var(--font-space);
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 0.8rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .podium-mini-row {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.5rem 0.8rem;
      background: rgba(255,255,255,0.01);
      border: 1px solid rgba(255,255,255,0.03);
      border-radius: 10px;
      margin-bottom: 0.5rem;
    }

    .podium-mini-index {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: bold;
    }

    /* ==========================================
       7. SETTINGS MODAL DIALOG
       ========================================== */
    .settings-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(3, 7, 18, 0.8);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
    }

    .settings-backdrop.active {
      opacity: 1;
      pointer-events: auto;
    }

    .settings-modal {
      background: #0f172a;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      width: 480px;
      max-width: 90%;
      padding: 2.2rem;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
      transform: scale(0.92);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.15);
    }

    .settings-backdrop.active .settings-modal {
      transform: scale(1);
    }

    .settings-title-group {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding-bottom: 0.8rem;
      margin-bottom: 1.5rem;
    }

    .settings-title {
      font-family: var(--font-space);
      font-size: 1.25rem;
      font-weight: 700;
    }

    .close-modal-btn {
      background: transparent;
      border: none;
      color: #9ca3af;
      font-size: 1.2rem;
      cursor: pointer;
    }

    .close-modal-btn:hover {
      color: white;
    }

    .form-input-box {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1.2rem;
    }

    .form-input-box label {
      font-size: 0.88rem;
      font-weight: 600;
      color: #9ca3af;
    }

    .form-input-box input {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 0.8rem 1rem;
      color: white;
      font-family: var(--font-main);
      font-size: 0.95rem;
      transition: all 0.25s ease;
    }

    .form-input-box input:focus {
      outline: none;
      border-color: var(--neon-blue);
      box-shadow: 0 0 10px var(--neon-blue-glow);
      background: rgba(255,255,255,0.05);
    }

    .empty-board-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: #9ca3af;
      gap: 1rem;
      text-align: center;
      min-height: 250px;
    }

    .empty-board-state i {
      font-size: 3.5rem;
      opacity: 0.2;
    }

    /* ==========================================
       8. ANIMATIONS & KEYFRAMES
       ========================================== */
    @keyframes pulseGlow {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.8; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes floatMascot {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(0.8deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }

    .effect-score-changed {
      animation: scoreHighlight 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.35);
    }

    @keyframes scoreHighlight {
      0% { transform: scale(1); }
      50% { transform: scale(1.25); color: #10b981; }
      100% { transform: scale(1); }
    }

    /* ==========================================
       9. RESPONSIVE MEDIA QUERIES (100% RESPONSIVE)
       ========================================== */
    @media (max-width: 1024px) {
      .view-focus {
        grid-template-columns: 1fr; /* Kolom tunggal di tablet/HP */
      }
      .view-grid-all {
        grid-template-columns: 1fr; /* Kolom tunggal di tablet/HP */
      }
      header {
        padding: 0.8rem 1.5rem;
      }
      .header-center-info h1 {
        font-size: 1.25rem;
      }
      .logo-img-wrapper {
        padding: 4px 10px;
        height: 40px;
      }
    }

    @media (max-width: 640px) {
      header {
        flex-direction: column;
        gap: 0.8rem;
        padding: 1rem;
      }
      .logo-img-wrapper {
        height: 36px;
      }
      .controls-wrapper {
        padding: 1rem;
        flex-direction: column;
        align-items: stretch;
      }
      .nav-tabs {
        flex-direction: column;
        width: 100%;
      }
      .tab-trigger {
        justify-content: center;
      }
      .actions-group {
        justify-content: center;
      }
      .dashboard-view-wrapper {
        padding: 1rem;
      }
      .contestant-card {
        padding: 0.8rem 1rem;
        gap: 0.8rem;
      }
      .team-name {

    let simTimer = null;

    // Ambil Simpanan API URL

    // Data Awal Mock/Demo yang Diuji secara Visual

        { kode: 'MU13', nama: 'SD NEGERI 6 DAUHWARU', total: 700, rank: 1, status: 'LOLOS FINAL' },

        { kode: 'MA09', nama: 'SMP NEGERI 2 MENDOYO', total: 700, rank: 1, status: 'LOLOS FINAL' },
        { kode: 'MA05', nama: 'SMP NEGERI 3 BALUK', total: 600, rank: 2, status: 'LOLOS FINAL' },
        { kode: 'MA02', nama: 'SMP NEGERI 1 NEGARA', total: 450, rank: 3, status: 'LOLOS FINAL' },
        { kode: 'MA12', nama: 'SMP SDK MARSUDIRINI', total: 350, rank: 4, status: 'LOLOS FINAL' },

      ],

        { kode: 'WI05', nama: 'SMA NEGERI 1 NEGARA', total: 800, rank: 1, status: 'LOLOS FINAL' },
        { kode: 'WI08', nama: 'SMA NEGERI 2 NEGARA', total: 650, rank: 2, status: 'LOLOS FINAL' },
        { kode: 'WI03', nama: 'SMA NEGERI 1 MENDOYO', total: 550, rank: 3, status: 'LOLOS FINAL' },
        { kode: 'WI11', nama: 'SMK NEGERI 1 NEGARA', total: 400, rank: 4, status: 'LOLOS FINAL' },

    // Urutkan data awal secara descending

    // ==========================================
    // DATA SORT & CLASSIFY ENGINE
    // ==========================================
    function reorderCategory(cat) {
      liveScoreboardData[cat].sort((a, b) => b.total - a.total);
      liveScoreboardData[cat].forEach((item, index) => {
        item.rank = index + 1;
      });

    // ==========================================
    // NAVIGATION CONTROLS (TABS & MODES)
    // ==========================================
    function changeCategory(cat) {
      if (allCategoriesMode) {
        toggleViewAll(); // Kembalikan ke fokus view
      }
      activeCategory = cat;
      
      const tabTriggers = document.querySelectorAll('#tabNavGroup .tab-trigger');
      tabTriggers.forEach(btn => btn.classList.remove('active'));

      renderViewPort();
    }

    function toggleViewAll() {
      allCategoriesMode = !allCategoriesMode;
      const btnAll = document.getElementById('btnToggleAll');
      const tabTriggers = document.querySelectorAll('#tabNavGroup .tab-trigger:not(#btnToggleAll)');
      
      if (allCategoriesMode) {
        btnAll.classList.add('active');

        return;

      renderViewPort();
    }

    // ==========================================
    // RENDER VIEWPORT DOM ENGINE
    // ==========================================
    // Update data kartu di setiap list kontestan yang terpasang di DOM menggunakan FLIP (First, Last, Invert, Play)
    function updateCategoryBoard(cat, listContainer) {
      if (!listContainer) return;
      
      const items = liveScoreboardData[cat];
      if (!items || items.length === 0) {
        listContainer.innerHTML = `
          <div class="empty-board-state">
            <i class="fa-solid fa-folder-open"></i>
            <div>Belum ada data finalis.<br><span style="font-size:0.75rem; color: #9ca3af;">Hubungkan API Sheets untuk sinkronisasi.</span></div>
          </div>
        `;
        return;
      }

      // 1. FIRST: Catat posisi koordinat awal semua card sebelum reorder
      const firstPositions = {};
      const existingCards = listContainer.querySelectorAll('.contestant-card');
      existingCards.forEach(card => {
        const kode = card.getAttribute('data-kode');
        if (kode) {
          firstPositions[kode] = card.getBoundingClientRect();
        }
      });

      // Bersihkan empty state jika ada
      const emptyState = listContainer.querySelector('.empty-board-state');
      if (emptyState) emptyState.remove();

      // 2. Perbarui konten, skor, dan peringkat kontestan secara dinamis
      const topScore = Math.max(...items.map(i => i.total), 1);
      const newCardElements = [];

      items.forEach((item, index) => {
        const rank = index + 1;
        let card = listContainer.querySelector(`.contestant-card[data-kode="${item.kode}"]`);

        if (!card) {
          // Buat card baru jika belum terpasang di DOM
          card = document.createElement('div');
          card.className = `contestant-card top-${rank}`;
          card.setAttribute('data-kode', item.kode);
        } else {
          // Perbarui kelas peringkat agar styling medal berpindah secara dinamis
          card.className = `contestant-card top-${rank}`;
        }

        const fillWidth = Math.max((item.total / topScore) * 100, 8);
        let badgeMedal = rank;
        if (rank === 1) badgeMedal = '<i class="fa-solid fa-crown"></i>';
        else if (rank === 2) badgeMedal = '<i class="fa-solid fa-medal"></i>';
        else if (rank === 3) badgeMedal = '<i class="fa-solid fa-medal"></i>';

        card.innerHTML = `
          <div class="medal-icon-wrapper">${badgeMedal}</div>
          <div class="info-container">
            <div class="team-name">${item.nama}</div>
            <div class="team-meta">
              <span><i class="fa-solid fa-qrcode" style="color: var(--neon-blue);"></i> ${item.kode}</span>
              <span style="opacity:0.3;">|</span>
              <span class="badge-status"><i class="fa-solid fa-shield-heart"></i> ${item.status || 'FINALIS'}</span>
            </div>
          </div>
          <div class="score-wrapper">
            <div class="score-val" id="scoreval-${cat}-${item.kode}">${item.total}</div>
            <div class="score-lbl">Skor</div>
          </div>
          <div class="indicator-bar-bg">
            <div class="indicator-bar-fill" style="width: ${fillWidth}%"></div>
          </div>
        `;

        newCardElements.push(card);
      });

      // Bersihkan kontestan lama yang tersisa dari list
      existingCards.forEach(card => {
        const kode = card.getAttribute('data-kode');
        if (!items.find(item => item.kode === kode)) {
          card.remove();
        }
      });

      // 3. REORDER DOM: Susun kembali kartu kontestan sesuai urutan peringkat baru
      newCardElements.forEach(card => {
        listContainer.appendChild(card);
      });

      // 4. LAST, INVERT, PLAY (FLIP Animation Loop)
      requestAnimationFrame(() => {
        newCardElements.forEach(card => {
          const kode = card.getAttribute('data-kode');
          const firstRect = firstPositions[kode];
          
          if (firstRect) {
            const lastRect = card.getBoundingClientRect();
            const deltaY = firstRect.top - lastRect.top;

            if (deltaY !== 0) {
              // INVERT: Kembalikan kartu secara instan ke posisi koordinat lamanya
              card.style.transition = 'none';
              card.style.transform = `translateY(${deltaY}px)`;
              
              // Memicu reflow layout browser
              card.offsetHeight; 

              // PLAY: Jalankan animasi meluncur mulus (ease-out) ke koordinat barunya
              card.style.transition = 'transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), background-color 0.4s, border-color 0.4s, box-shadow 0.4s';
              card.style.transform = '';
            }
          } else {
            // Animasi Fade-in meluncur untuk kartu baru yang baru bergabung
            card.style.transition = 'none';
            card.style.opacity = '0';
            card.style.transform = 'translateY(15px)';
            card.offsetHeight;
            card.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
            card.style.opacity = '1';
            card.style.transform = '';
          }
        });
      });
    }

    // Inisialisasi awal atau perubahan mode layout utama (Grid vs Focus)

    // Membuat kerangka statis Board Leaderboard (Card kontestan di-update secara terpisah)
    function createStaticBoardDOM(cat, title, iconClass) {
      const cardContainer = document.createElement('div');

    // ==========================================
    // SINKRONISASI REAL-TIME DENGAN GOOGLE SHEETS
    // ==========================================
    // Fetch data Google Sheets menggunakan metode JSONP untuk memintas pembatasan CORS browser
    function fetchSheetDataJSONP(spreadsheetId, sheetName, callbackName) {
      return new Promise((resolve, reject) => {
        // Definisikan fungsi callback secara dinamis di lingkup global window
        window[callbackName] = function(data) {
          cleanup();
          if (data && data.status === 'ok') {
            resolve(data.table);
          } else {
            reject(new Error(`Gagal mengambil data dari sheet ${sheetName}: ` + (data ? data.status : 'Respons kosong')));
          }
        };

        const script = document.createElement('script');
        script.id = `script_${callbackName}`;
        // Ambil data visualisasi format default (JSONP wrapper) dari Google Sheets
        script.src = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=responseHandler:${callbackName}&sheet=${encodeURIComponent(sheetName)}&t=${Date.now()}`;
        
        script.onerror = function() {
          cleanup();
          reject(new Error(`Gagal memuat data Google Sheets untuk sheet ${sheetName} (Cek koneksi/akses internet)`));
        };

        document.body.appendChild(script);

        function cleanup() {
          const el = document.getElementById(`script_${callbackName}`);
          if (el) el.remove();
          delete window[callbackName];
        }
      });
    }

    // Mengurai data finalis dari objek tabel JSONP Google Sheets
    function extractFinalistsFromTable(table) {
      if (!table || !table.rows) return [];
      
      const rows = table.rows;
      let headerIndex = -1;
      
      // Cari baris header yang bertindak sebagai pemisah awal data finalis
      for (let i = 0; i < rows.length; i++) {
        const row = rows[i];
        if (row && row.c && row.c[2] && row.c[2].v && row.c[2].v.toString().includes("Nama Sekolah (Final)")) {
          headerIndex = i;
          break;
        }
      }

      if (headerIndex === -1) return [];

      const finalists = [];
      // 5 baris setelah baris header adalah data 5 besar finalis LCC
      for (let i = headerIndex + 1; i <= headerIndex + 5; i++) {
        const row = rows[i];
        if (row && row.c) {
          const kode = row.c[1] && row.c[1].v ? row.c[1].v.toString().trim() : '';
          const nama = row.c[2] && row.c[2].v ? row.c[2].v.toString().trim() : '';
          const totalRaw = row.c[3] ? row.c[3].v : 0;
          const rankRaw = row.c[4] ? row.c[4].v : 1;
          const status = row.c[5] && row.c[5].v ? row.c[5].v.toString().trim() : 'FINALIS';

          if (kode && kode !== '') {
            let total = parseFloat(totalRaw);
            if (isNaN(total)) total = 0;
            
            let rank = parseInt(rankRaw);
            if (isNaN(rank)) rank = 1;

            finalists.push({
              kode: kode,
              nama: nama,
              total: total,
              rank: rank,
              status: status
            });
          }
        }
      }
      return finalists;
    }

    function syncSheetsData() {
      if (!sheetsApiEndpoint) return;

      const refreshIcon = document.getElementById('syncSpinIcon');
      if (refreshIcon) refreshIcon.classList.add('fa-spin');

      // Deteksi apakah target koneksi adalah URL Google Sheets biasa
      const sheetIdMatch = sheetsApiEndpoint.match(/\/d\/([a-zA-Z0-9-_]+)/);

      if (sheetIdMatch) {
        const spreadsheetId = sheetIdMatch[1];
        
        // Fetch data paralel menggunakan JSONP (Bebas hambatan CORS!)
        const fetchPromises = [
          fetchSheetDataJSONP(spreadsheetId, 'PMR MULA', 'cb_mula_' + Date.now()),
          fetchSheetDataJSONP(spreadsheetId, 'PMR MADYA', 'cb_madya_' + Date.now()),
          fetchSheetDataJSONP(spreadsheetId, 'PMR WIRA', 'cb_wira_' + Date.now())
        ];

        Promise.all(fetchPromises)
          .then(([tableMula, tableMadya, tableWira]) => {
            setPingStatus('online', 'Tersambung ke Google Sheets');
            
            cachedPreviousData = JSON.parse(JSON.stringify(liveScoreboardData));
            
            liveScoreboardData.mula = extractFinalistsFromTable(tableMula);
            liveScoreboardData.madya = extractFinalistsFromTable(tableMadya);
            liveScoreboardData.wira = extractFinalistsFromTable(tableWira);
            
            reorderCategories();
            renderViewPort();
            animateScoreChanges();
          })
          .catch(err => {
            console.error(err);
            setPingStatus('offline', 'Koneksi Sheets Gagal');
          })
          .finally(() => {
            if (refreshIcon) refreshIcon.classList.remove('fa-spin');
          });
      } else {
        // Logika fallback menggunakan JSON dari Google Apps Script Web App
        fetch(sheetsApiEndpoint)
          .then(res => {
            if (!res.ok) throw new Error('API Respon Bermasalah');
            return res.json();
          })
          .then(payload => {
            setPingStatus('online', 'Tersambung Live');
            
            cachedPreviousData = JSON.parse(JSON.stringify(liveScoreboardData));
            
            if (payload.mula) liveScoreboardData.mula = payload.mula;
            if (payload.madya) liveScoreboardData.madya = payload.madya;
            if (payload.wira) liveScoreboardData.wira = payload.wira;
            
            reorderCategories();
            renderViewPort();
            animateScoreChanges();
          })
          .catch(err => {
            console.error(err);
            setPingStatus('offline', 'Koneksi API Gagal');
          })
          .finally(() => {
            if (refreshIcon) refreshIcon.classList.remove('fa-spin');
          });
      }
    }

    function animateScoreChanges() {
      if (!cachedPreviousData) return;

      ['mula', 'madya', 'wira'].forEach(cat => {
        liveScoreboardData[cat].forEach(item => {
          const prevItem = cachedPreviousData[cat].find(x => x.kode === item.kode);
          if (prevItem && prevItem.total !== item.total) {
            const numEl = document.getElementById(`scoreval-${cat}-${item.kode}`);
            if (numEl) {
              numEl.classList.add('effect-score-changed');
              setTimeout(() => {
                numEl.classList.remove('effect-score-changed');
              }, 600);
            }
          }
        });
      });
    }

    function setPingStatus(state, msg) {
      const dot = document.getElementById('apiStatusPing');
      const label = document.getElementById('apiStatusMsg');
      
      dot.className = 'status-ping ' + state;
      label.innerText = msg;
    }

    // ==========================================
    // SETTINGS MODAL SYSTEM
    // ==========================================
    function showSettingsModal() {
      document.getElementById('modalBackdrop').classList.add('active');
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') hideSettingsModal();
    });

    function hideSettingsModal() {
      document.getElementById('modalBackdrop').classList.remove('active');
    }

    function saveConnectionSettings() {
      const rawUrl = document.getElementById('appsScriptUrl').value.trim();
      sheetsApiEndpoint = rawUrl;
      localStorage.setItem('LCC_API_ENDPOINT', rawUrl);
      hideSettingsModal();

      if (rawUrl) {
        if (simulationActive) toggleSimulation(false);
        if (autoRefreshTimer) clearInterval(autoRefreshTimer);
        
        setPingStatus('connecting', 'Menghubungkan...');
        syncSheetsData();
        autoRefreshTimer = setInterval(syncSheetsData, 1500);
      } else {
        if (autoRefreshTimer) clearInterval(autoRefreshTimer);
        setPingStatus('offline', 'Belum Terhubung API');
      }
    }

    // ==========================================
    // MODE UJI COBA / SIMULASI PERTANDINGAN
    // ==========================================
    function toggleSimulation(forceValue = null) {
      simulationActive = forceValue !== null ? forceValue : !simulationActive;
      const simBtn = document.getElementById('btnSimulation');

      if (simulationActive) {
        simBtn.innerHTML = '<i class="fa-solid fa-circle-stop"></i> Hentikan Uji Coba';
        simBtn.style.background = 'rgba(255, 42, 95, 0.15)';
        simBtn.style.borderColor = 'rgba(255, 42, 95, 0.3)';
        setPingStatus('online', 'Uji Coba Lomba Aktif (Simulasi)');

        if (autoRefreshTimer) clearInterval(autoRefreshTimer);

        // Simulasi persaingan nilai finalis bertambah/berkurang acak
        simTimer = setInterval(() => {
          const cats = ['mula', 'madya', 'wira'];
          const randomCat = cats[Math.floor(Math.random() * cats.length)];
          const group = liveScoreboardData[randomCat];
          
          if (group && group.length > 0) {
            const index = Math.floor(Math.random() * group.length);
            const correctOption = Math.random() > 0.35; 
            
            if (correctOption) {
              group[index].total += 100;
            } else {
              group[index].total = Math.max(group[index].total - 50, 0); 
            }
            
            cachedPreviousData = JSON.parse(JSON.stringify(liveScoreboardData));
            reorderCategory(randomCat);
            renderViewPort();
            animateScoreChanges();
          }
        }, 2200);
      } else {
        simBtn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i> Uji Coba Lomba';
        simBtn.style.background = 'rgba(0, 240, 255, 0.1)';
        simBtn.style.borderColor = 'rgba(0, 240, 255, 0.25)';
        
        if (simTimer) clearInterval(simTimer);
        
        if (sheetsApiEndpoint) {
          setPingStatus('connecting', 'Menghubungkan live...');
          syncSheetsData();
          autoRefreshTimer = setInterval(syncSheetsData, 1500);
        } else {
          setPingStatus('offline', 'Belum Terhubung API');
        }
      }
    }
  </script>
</body>
